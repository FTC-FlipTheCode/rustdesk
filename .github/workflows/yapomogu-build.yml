name: Build Я ПОМОГУ! Агент (Windows)

on:
  push:
    branches: [master]
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Init submodules
        shell: bash
        run: git submodule update --init --recursive

      - name: Install Rust stable (MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Flutter 3.24.5
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.5"
          channel: stable
          cache: true

      - name: Enable Flutter Windows Desktop
        run: flutter config --enable-windows-desktop

      - name: Install LLVM 15.0.2
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "15.0.2"

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: vcpkg
          key: vcpkg-${{ runner.os }}-libvpx-libyuv-opus-aom

      - name: Setup vcpkg + install native libs
        shell: bash
        run: |
          if [ ! -d vcpkg ]; then
            git clone https://github.com/microsoft/vcpkg
            ./vcpkg/bootstrap-vcpkg.bat
          fi
          ./vcpkg/vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static

      - name: Patch hbb_common config
        shell: python
        run: |
          import re, os
          path = "libs/hbb_common/src/config.rs"
          with open(path, encoding="utf-8") as f:
              src = f.read()
          src = src.replace('"RustDesk"', '"Я ПОМОГУ! Агент"', 1)
          server = os.environ.get("RENDEZVOUS_SERVER") or "agent.yapomogu.com"
          src = src.replace('"rs-ny.rustdesk.com"', f'"{server}"', 1)
          pub_key = os.environ.get("RS_PUB_KEY", "")
          if pub_key:
              src = re.sub(
                  r'pub const RS_PUB_KEY: &str = "[^"]*"',
                  f'pub const RS_PUB_KEY: &str = "{pub_key}"',
                  src,
              )
          with open(path, "w", encoding="utf-8") as f:
              f.write(src)
        env:
          RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
          RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

      - name: Run Flutter tests
        working-directory: flutter
        run: flutter test test/yapomogu/

      - name: Build portable .exe
        shell: bash
        run: python3 ./build.py --portable --hwcodec --flutter
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          LIBCLANG_PATH: ${{ env.LLVM_PATH }}/bin

      - name: Get version
        id: version
        shell: bash
        run: echo "ver=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yapomogu-windows-x64-${{ steps.version.outputs.ver }}
          path: target/release/*portable*.exe
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/*portable*.exe
          name: "Я ПОМОГУ! Агент ${{ steps.version.outputs.ver }}"
